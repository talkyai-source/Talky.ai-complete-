# /etc/nginx/sites-available/talky.conf
# ─────────────────────────────────────────────────────────────────────────────
# Talky.ai — Nginx Reverse Proxy
#
# What this does:
#   - Terminates HTTPS (port 443) → proxies to FastAPI on 127.0.0.1:8000
#   - Handles WebSocket upgrade (voice pipeline uses persistent WS connections)
#   - Rate-limits the API at the edge (before requests reach FastAPI)
#   - Serves the Next.js frontend (if running on the same server)
#   - Redirects HTTP → HTTPS
#   - Adds security headers
#
# Install:
#   sudo cp talky.conf /etc/nginx/sites-available/talky.conf
#   sudo ln -s /etc/nginx/sites-available/talky.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL cert (Let's Encrypt):
#   sudo certbot --nginx -d app.your-domain.com -d api.your-domain.com
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones (defined at http level — add to /etc/nginx/nginx.conf) ──
# If your nginx.conf already has an http block, add these lines inside it:
#
#   limit_req_zone $binary_remote_addr zone=talky_api:10m rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=talky_auth:10m rate=5r/m;
#   limit_conn_zone $binary_remote_addr zone=talky_ws:10m;
#
# For this file to work standalone, we use include:

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.your-domain.com api.your-domain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API Backend ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.your-domain.com;

    # SSL — managed by certbot (paths filled in automatically)
    ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;

    # Modern SSL settings (TLS 1.2+ only, strong ciphers)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geophone=(), microphone=(self)" always;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/talky-api-access.log;
    error_log  /var/log/nginx/talky-api-error.log warn;

    # ── Timeouts (generous for voice pipeline WS connections) ────
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;   # Voice calls can last minutes
    proxy_read_timeout    300s;

    # ── Buffer tuning (audio streaming) ──────────────────────────
    proxy_buffering off;          # Critical: disable for streaming responses
    proxy_buffer_size 4k;

    client_max_body_size 50M;     # Allow audio file uploads

    # ── WebSocket connections (voice pipeline) ───────────────────
    # FastAPI WebSocket endpoints: /api/v1/voice/ws, /api/v1/assistant/ws
    location ~ ^/api/v1/(voice|assistant|ai-options)/ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WS-specific: no timeout for active voice calls
        proxy_read_timeout 3600s;

        # Limit concurrent WebSocket connections per IP
        limit_conn talky_ws 10;
    }

    # ── Auth endpoints (strict rate limit) ───────────────────────
    location ~ ^/api/v1/auth/(login|register|token) {
        limit_req zone=talky_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── General API (standard rate limit) ────────────────────────
    location /api/ {
        limit_req zone=talky_api burst=100 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (no rate limit, no auth) ────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ── Block direct access to internal paths ────────────────────
    location ~ ^/(metrics|docs|redoc|openapi.json) {
        # Only allow from loopback (for Prometheus scraper on same server)
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000;
    }
}

# ── Frontend (Next.js) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/app.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/talky-frontend-access.log;
    error_log  /var/log/nginx/talky-frontend-error.log warn;

    # Next.js runs on port 3000 (adjust if different)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next.js static assets — cache aggressively
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        expires            365d;
        add_header Cache-Control "public, immutable";
    }
}
