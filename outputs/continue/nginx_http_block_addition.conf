# ─────────────────────────────────────────────────────────────────────────────
# ADD THESE LINES to /etc/nginx/nginx.conf inside the existing http { } block.
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones for Talky.ai
# talky_api:  general API calls — 30 requests/second per IP
# talky_auth: auth endpoints   — 5 requests/minute per IP (brute-force protection)
# talky_ws:   WebSocket conns  — max 10 concurrent per IP
limit_req_zone  $binary_remote_addr zone=talky_api:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr zone=talky_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=talky_ws:10m;
