[rtpengine]
# ============================================================
# Network
# ============================================================
table = 0
interface = lo
listen-ng = 127.0.0.1:2223
port-min = 30000
port-max = 34999
log-level = 6

# ============================================================
# CVE-2025-53399 MITIGATION  (CVSS 9.3 — RTP Injection / Media Bleed)
# Requires RTPEngine >= mr13.4.1.1
# Reference: https://www.enablesecurity.com/blog/rtpengine-critical-security-advisory-cve-2025-53399
# ============================================================

# Reject RTP packets arriving from any source that doesn't match
# the negotiated endpoint. Prevents RTP injection attacks.
strict-source = yes

# Use heuristic learning with strict validation instead of
# open endpoint-learning that is vulnerable to spoofed packets.
# Options: off | heuristic | immediate
# DO NOT use 'immediate' — it is the vulnerable mode.
learning-mode = heuristic

# ============================================================
# SRTP ENFORCEMENT
# All media streams must be encrypted — no plaintext RTP allowed.
# ============================================================

# Force SRTP for all calls. Calls without SRTP will be rejected.
force-srtp = yes

# Accept DTLS (WebRTC) and SDES key negotiation
dtls-passive = yes

# Require SRTP for transcoding paths as well
# (prevents a downgrade via mid-call re-INVITE)
no-fallback = yes

# ============================================================
# PERFORMANCE TUNING  (single-server baseline)
# ============================================================

# Number of worker threads — set to (CPU cores - 1)
# Adjust based on: nproc --all
num-threads = 3

# Timeout (seconds) for idle RTP streams before teardown
timeout = 60
silent-timeout = 3600
final-timeout = 10800

# ============================================================
# LOGGING
# ============================================================

# Log to syslog (integrates with journald / log aggregation)
log-facility = daemon
log-facility-cdr = local0
log-facility-rtcp = local1
