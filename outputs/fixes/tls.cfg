# OpenSIPS TLS Configuration
# FIX: Certificate validation is now ENABLED on both server and client sides.
# Previously verify_cert=no allowed MITM attacks on all TLS SIP connections.
#
# PREREQUISITE: You must provision real TLS certificates before deploying.
# Options:
#   a) Let's Encrypt (recommended for internet-facing deployments):
#      certbot certonly --standalone -d sip.your-domain.com
#      Then set paths below to /etc/letsencrypt/live/sip.your-domain.com/
#
#   b) Self-signed CA (for internal/test deployments only):
#      See scripts/gen-sip-certs.sh for a helper script.
#
#   c) Commercial certificate from your SIP carrier

[server:default]
method = TLSv1.2+
private_key = /etc/opensips/certs/server.key
certificate = /etc/opensips/certs/server.crt

# FIX: verify_cert was 'no' — now enforced
verify_cert = yes

# FIX: require_cert was 'no' — now enforced
# Clients that don't present a certificate will be rejected.
require_cert = yes

# CA bundle for validating client certificates
ca_list = /etc/ssl/certs/ca-certificates.crt

[client:default]
# Used for outbound TLS connections (to carriers, upstream proxies)
method = TLSv1.2+
private_key = /etc/opensips/certs/server.key
certificate = /etc/opensips/certs/server.crt

# FIX: verify_cert was 'no' — now enforced
# This validates the carrier/upstream server's certificate.
verify_cert = yes

# FIX: require_cert was 'no' — now enforced
require_cert = yes

ca_list = /etc/ssl/certs/ca-certificates.crt
