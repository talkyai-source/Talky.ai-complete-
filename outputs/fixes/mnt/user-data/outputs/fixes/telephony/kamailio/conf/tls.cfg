# Kamailio TLS Configuration
# Both server and client blocks now enforce certificate validation.

[server:default]
private_key = /etc/kamailio/certs/server.key
certificate = /etc/kamailio/certs/server.crt

# TLS 1.2 minimum — TLS 1.0/1.1 are deprecated and vulnerable
method = TLSv1.2+

# CA bundle — used to validate client certificates
ca_list = /etc/ssl/certs/ca-certificates.crt

# FIX: was 'no' — MITM attacks were possible
verify_certificate = yes

# FIX: was 'no' — unauthenticated clients were accepted
require_certificate = yes

# Disable weak cipher suites
ciphers_list = ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:!RC4:!DES:!3DES:!MD5:!EXPORT

[client:default]
# Outbound TLS connections (to carriers, upstream SBCs)
private_key = /etc/kamailio/certs/server.key
certificate = /etc/kamailio/certs/server.crt
method = TLSv1.2+
ca_list = /etc/ssl/certs/ca-certificates.crt

# FIX: validate the remote server's certificate on outbound connections
verify_certificate = yes
require_certificate = yes

ciphers_list = ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:!RC4:!DES:!3DES:!MD5:!EXPORT
