; Talky.ai PgBouncer configuration — Phase 2.3
;
; Why PgBouncer:
;   At 50 concurrent calls × ~2 active queries/call/min, raw asyncpg
;   pools across 3 backend pods (3 × 20 = 60 connections) easily
;   exceed Postgres's default 100 max_connections, and managed Postgres
;   tiers cap connections aggressively (RDS db.t3.medium = 198, Aiven
;   startup-2 = 50). Direct connections also pay TCP+TLS+pg auth on
;   every short-lived query, which costs ~20-40ms/query at scale.
;
; PgBouncer in transaction-pooling mode multiplexes many client
; connections onto a small pool of backend connections. The app sees
; what looks like 200 connections; Postgres only sees 20.
;
; Pool mode considerations:
;   - "transaction" mode is the right default. Each transaction
;     pins a backend connection for its duration only.
;   - Server-side prepared statements ARE NOT supported in transaction
;     mode. asyncpg uses prepared statements by default — disable via
;     `statement_cache_size=0` on `asyncpg.create_pool()`.
;   - SET LOCAL inside a transaction works fine (we use it for RLS).
;   - SET (without LOCAL) and LISTEN/NOTIFY do NOT work in transaction
;     pooling. We don't use them on the hot path.
;
; Sizing reasoning (Phase 2 target = 3 pods, 50-call pod cap):
;   - default_pool_size=200: backend pool to Postgres (across all clients)
;   - max_client_conn=2000: total app-side connections we'll accept
;   - reserve_pool_size=20 + reserve_pool_timeout=2s: burst headroom
;   - server_idle_timeout=60s: recycle idle backend conns
;   - server_lifetime=3600s: hard rotate every hour to refresh TLS,
;     force any stale state out

[databases]
talkyai = host=postgres-primary.talky.svc.cluster.local port=5432 dbname=talkyai
talkyai_ro = host=postgres-replica.talky.svc.cluster.local port=5432 dbname=talkyai

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
default_pool_size = 200
max_client_conn = 2000
reserve_pool_size = 20
reserve_pool_timeout = 2

server_idle_timeout = 60
server_lifetime = 3600
server_reset_query = DISCARD ALL

; Logging — quiet by default; bump to verbose=1 when debugging.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
verbose = 0

; TLS to backend Postgres (managed PG insists on it).
server_tls_sslmode = require

; Admin / stats access — restrict to in-cluster operators.
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

; Health check used by k8s readiness probe.
ignore_startup_parameters = extra_float_digits,search_path
