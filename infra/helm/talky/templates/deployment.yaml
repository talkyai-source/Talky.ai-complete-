apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "talky.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "talky.labels" . | nindent 4 }}
spec:
  replicas: {{ if .Values.autoscaling.enabled }}{{ .Values.autoscaling.minReplicas }}{{ else }}{{ .Values.replicaCount }}{{ end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: {{- include "talky.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "talky.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart on values change so config edits propagate.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "talky.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}

      {{- if eq .Values.podAntiAffinity "soft" }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: {{- include "talky.selectorLabels" . | nindent 20 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ required "image.tag must be set; never deploy :latest" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # SIGTERM → uvicorn → FastAPI lifespan shutdown →
          # readiness.begin_drain() → /healthz/ready 503.
          # The 5s sleep gives kube-proxy a full reconciliation pass
          # to evict the pod from the Service endpoints before the
          # lifespan loop starts forcing teardown.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          envFrom:
            - configMapRef:
                name: {{ include "talky.fullname" . }}-env
          env:
            # ─ Postgres (PgBouncer fronted) ──────────────────
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.primaryUrlSecret.name }}
                  key:  {{ .Values.postgres.primaryUrlSecret.key }}
            - name: READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.replicaUrlSecret.name }}
                  key:  {{ .Values.postgres.replicaUrlSecret.key }}
            # ─ Redis (single / sentinel / cluster) ───────────
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.urlSecret.name }}
                  key:  {{ .Values.redis.urlSecret.key }}
            # ─ Provider keys (mounted from external secret) ─
            - name: GROQ_API_KEYS
              valueFrom:
                secretKeyRef: { name: talky-providers, key: groq_api_keys, optional: true }
            - name: ELEVENLABS_API_KEYS
              valueFrom:
                secretKeyRef: { name: talky-providers, key: elevenlabs_api_keys, optional: true }
            - name: DEEPGRAM_API_KEYS
              valueFrom:
                secretKeyRef: { name: talky-providers, key: deepgram_api_keys, optional: true }
            - name: CARTESIA_API_KEYS
              valueFrom:
                secretKeyRef: { name: talky-providers, key: cartesia_api_keys, optional: true }

          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
