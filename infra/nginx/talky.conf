# Talky.ai NGINX front-door.
#
# Two jobs:
#   1. TLS termination (cert-manager / Caddy / acme.sh keep certs fresh).
#   2. Consistent-hash session affinity so audio POSTs for a given call
#      always land on the pod that opened the call session.
#
# Why affinity matters:
#   Voice call state (VoiceSession, STT WebSocket, TTS persistent WS,
#   audio queues) lives in-process on the pod that took the call. If
#   subsequent audio chunks were free-routed to a different pod, that
#   pod would not have the session and would drop the audio. Phase 2
#   keeps state local; Phase 3+ can add cross-pod state migration.
#
# Why consistent hash (not ip_hash, not least_conn):
#   - ip_hash: many telephony gateways / SIP proxies show one source IP,
#     so every call gets routed to one pod — no spread.
#   - least_conn: forgets the call mid-flight when load shifts.
#   - hash <session_id> consistent: only the affected bucket reshuffles
#     when a pod is added or removed, so existing calls keep their
#     pod and only new calls get rebalanced.
#
# How session_id is extracted:
#   The C++ telephony gateway POSTs audio to
#       /api/v1/sip/telephony/audio/{session_id}
#   We capture {session_id} into $session_id with a `map` block and
#   use it as the hash key. For non-audio routes we fall back to a
#   per-request hash (effectively round-robin) since they're stateless.

worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # ── Common defaults ──────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    keepalive_requests 1000;

    server_tokens off;
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Audio chunks are small (~3-6 KiB) and time-sensitive — turn off
    # response buffering so the gateway doesn't hold a frame waiting for
    # the buffer to fill.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    # WebSocket upgrade headers (used by FreeSWITCH mod_audio_fork bridge).
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # Build a Connection: upgrade header only when the client requested
    # an upgrade — avoids breaking plain HTTP/1.1 keep-alive.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Extract the session_id from /api/v1/sip/telephony/audio/{session_id}
    # so we can hash on it. For any other route the variable stays empty
    # and the upstream falls through to a non-affinity strategy.
    map $request_uri $session_id {
        default "";
        ~^/api/v1/sip/telephony/audio/(?<sid>[^/?]+)  $sid;
    }

    # When session_id is empty, hash on a fresh value per request so
    # stateless calls don't all bucket onto the same pod.
    map $session_id $affinity_key {
        ""      $request_id;
        default $session_id;
    }

    # ── Upstream pool ────────────────────────────────────────────────
    upstream talky_backend {
        # Consistent hash on the call's session_id. Adding/removing a
        # backend only reshuffles the affected ring slice, leaving most
        # in-flight calls on their original pod.
        hash $affinity_key consistent;

        # Pod list — replace with your deployment's service DNS.
        # In k8s use a headless Service so each pod resolves separately.
        server backend-0.talky-backend.svc.cluster.local:8000 max_fails=2 fail_timeout=10s;
        server backend-1.talky-backend.svc.cluster.local:8000 max_fails=2 fail_timeout=10s;
        server backend-2.talky-backend.svc.cluster.local:8000 max_fails=2 fail_timeout=10s;

        keepalive 64;
    }

    # ── Logging ──────────────────────────────────────────────────────
    log_format talky_json escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"req_id":"$request_id",'
            '"remote":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"req_time":$request_time,'
            '"bytes_sent":$body_bytes_sent,'
            '"session_id":"$session_id",'
            '"affinity_key":"$affinity_key"'
        '}';
    access_log /var/log/nginx/talky.access.log talky_json buffer=64k flush=1s;
    error_log  /var/log/nginx/talky.error.log warn;

    # ── HTTP → HTTPS redirect ───────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 308 https://$host$request_uri;
    }

    # ── Main HTTPS server ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name talky.example.com;

        # TLS — managed externally (Caddy / cert-manager).
        ssl_certificate     /etc/ssl/talky/fullchain.pem;
        ssl_certificate_key /etc/ssl/talky/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:talky_tls:32m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Audio path (sticky) ───────────────────────────────────
        # The hash is computed by the upstream block; we just send it
        # there. proxy_buffering is already off globally — confirmed
        # here for clarity, since latency on audio chunks is critical.
        location ~ ^/api/v1/sip/telephony/audio/ {
            proxy_pass http://talky_backend;
            proxy_buffering off;
            proxy_request_buffering off;
            # Audio frames are sub-second; abort upstream calls fast
            # so a stuck pod doesn't accumulate retries.
            proxy_connect_timeout 2s;
            proxy_send_timeout    5s;
            proxy_read_timeout    10s;
        }

        # ── Other API traffic (less timing-sensitive) ────────────
        location /api/ {
            proxy_pass http://talky_backend;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    60s;
        }

        # ── WebSocket bridges (FreeSWITCH mod_audio_fork etc.) ───
        location /ws/ {
            proxy_pass http://talky_backend;
            proxy_read_timeout    3600s;   # long-lived audio WS
            proxy_send_timeout    3600s;
            proxy_connect_timeout 5s;
        }

        # ── Liveness pass-through (always 200 if the pod is up) ──
        location = /healthz/live {
            proxy_pass http://talky_backend/api/v1/healthz/live;
            access_log off;
        }

        # ── Readiness pass-through (drives upstream eviction) ────
        # NGINX itself doesn't read this — k8s does, via its
        # readinessProbe on each pod, which removes the pod from the
        # Service endpoint slice when the probe fails. The endpoint
        # slice change reaches NGINX automatically through DNS /
        # k8s service resolution.
        location = /healthz/ready {
            proxy_pass http://talky_backend/api/v1/healthz/ready;
            access_log off;
        }

        # ── Default: deny ─────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
