services:
  # ============================================================================
  # DATABASE (PostgreSQL)
  # FIX: removed default password fallbacks — app will fail loudly if .env missing
  # FIX: port 5432 is no longer exposed to the host (internal network only)
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: talky-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # FIX: No host port binding — DB is only reachable from talky-network
    # For local admin access, use: docker compose exec db psql -U $POSTGRES_USER
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/database/complete_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - talky-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # CACHE (Redis)
  # FIX: port 6379 no longer exposed to host
  # FIX: Redis now requires AUTH password
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: talky-redis
    restart: unless-stopped
    # FIX: No host port binding
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    # FIX: Redis now requires password authentication
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    networks:
      - talky-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # BACKEND API
  # FIX: removed ./backend:/app volume mount — image is the source of truth
  # FIX: removed DATABASE_URL default value — fails loudly if not set
  # FIX: CORS_ORIGINS must be set explicitly in .env — no wildcard default
  # ============================================================================
  backend:
    image: ${BACKEND_IMAGE:-talky-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talky-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"  # FIX: bind to localhost only, not 0.0.0.0
    environment:
      # API Keys — all required, no defaults
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - VONAGE_API_KEY=${VONAGE_API_KEY}
      - VONAGE_API_SECRET=${VONAGE_API_SECRET}

      # Database — no fallback default
      - DATABASE_URL=${DATABASE_URL}

      # Redis — with password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Auth — no fallback default
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}

      # Application
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - FREESWITCH_HOST=172.17.0.1
    volumes:
      # FIX: only mount the logs directory, NOT the full source tree
      - backend-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talky-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # TELEPHONY (FreeSWITCH)
  # NOTE: network_mode: host is required for RTP — document firewall rules
  # ============================================================================
  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:v1.10.1-full
    container_name: talky-freeswitch
    restart: unless-stopped
    network_mode: host
    # IMPORTANT: With network_mode: host, FreeSWITCH binds directly to the
    # server's network interfaces. You MUST set firewall rules (see
    # scripts/firewall-setup.sh) to restrict SIP port 5080 to carrier IPs only.
    environment:
      - MOD_AUDIO_FORK=1
      - SIP_PORT=5080
      - RTP_PORT_START=16384
      - RTP_PORT_END=32768
    volumes:
      - ./backend/freeswitch_config/dialplan:/tmp/dialplan
      - ./backend/audio_files:/var/lib/freeswitch/sounds/custom
      - freeswitch-recordings:/var/lib/freeswitch/recordings
    command: ["freeswitch", "-nonat", "-c"]
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -x 'sofia status' | grep -q 'profile'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # DATABASE GUI (pgAdmin)
  # FIX: no longer exposed to host — access via SSH tunnel only
  # Usage: ssh -L 5050:localhost:5050 user@your-server
  # Then open: http://localhost:5050 in your local browser
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: talky-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    # FIX: bound to localhost only — not exposed publicly
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - talky-network
    depends_on:
      - db
    profiles:
      # FIX: pgAdmin only starts when explicitly requested
      # Run with: docker compose --profile admin up -d
      - admin

volumes:
  postgres-data:
  redis-data:
  backend-logs:
  freeswitch-recordings:
  pgadmin-data:

networks:
  talky-network:
    driver: bridge
    # FIX: internal: true prevents containers from reaching the internet directly
    # Remove this if your backend needs outbound internet access (it does for AI APIs)
    # internal: true
