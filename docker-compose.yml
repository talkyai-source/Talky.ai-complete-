services:
  # ============================================================================
  # DATABASE (PostgreSQL)
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: talky-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-talkyai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-talkyai_secret}
      - POSTGRES_DB=${POSTGRES_DB:-talkyai}
    ports:
      - "5432:5432" # Exposed for local development/pgAdmin
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/database/complete_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - talky-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U talkyai -d talkyai" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # CACHE (Redis)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: talky-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - talky-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # BACKEND API
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talky-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # API Keys
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - VONAGE_API_KEY=${VONAGE_API_KEY}
      - VONAGE_API_SECRET=${VONAGE_API_SECRET}

      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://talkyai:talkyai_secret@db:5432/talkyai}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      # Auth
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}

      # Application
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - FREESWITCH_HOST=172.17.0.1 # Host IP from container (Linux default)
    volumes:
      - ./backend:/app
      - backend-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talky-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # TELEPHONY (FreeSWITCH)
  # ============================================================================
  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:v1.10.1-full
    container_name: talky-freeswitch
    restart: unless-stopped
    network_mode: host # Required for proper RTP/SIP handling
    environment:
      - MOD_AUDIO_FORK=1
      - SIP_PORT=5080
      - RTP_PORT_START=16384
      - RTP_PORT_END=32768
    volumes:
      - ./backend/freeswitch_config/dialplan:/tmp/dialplan
      - ./backend/audio_files:/var/lib/freeswitch/sounds/custom
      - freeswitch-recordings:/var/lib/freeswitch/recordings
    command: [ "freeswitch", "-nonat", "-c" ]
    healthcheck:
      test: [ "CMD-SHELL", "fs_cli -x 'sofia status' | grep -q 'profile'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # DATABASE GUI (pgAdmin)
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: talky-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@talky.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - talky-network
    depends_on:
      - db

volumes:
  postgres-data:
  redis-data:
  backend-logs:
  freeswitch-recordings:
  pgadmin-data:


networks:
  talky-network:
    driver: bridge
