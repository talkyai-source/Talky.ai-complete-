# alembic.ini — Talky.ai migration configuration
# Place this file in the backend/ directory (same level as app/)

[alembic]
# Path to migration scripts, relative to this file
script_location = Alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Maximum length of the slug (description) in the filename
truncate_slug_length = 40

# sqlalchemy.url is injected at runtime from DATABASE_URL env var in env.py
# Do NOT put credentials here — this file is committed to git.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
