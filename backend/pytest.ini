[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — register so `--strict-markers` would catch typos later.
markers =
    chaos: chaos / fault-injection tests; slow, run separately with `pytest -m chaos`
    integration: tests that require postgres + redis service containers
    security: auth, RLS, rate-limit, header tests

# Filter out deprecation warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning:supabase.*
    ignore::DeprecationWarning:gotrue.*
    ignore::DeprecationWarning:postgrest.*
    ignore::DeprecationWarning:storage3.*
    ignore::DeprecationWarning:httpx.*
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore:.*pydantic.config.Extra.*:DeprecationWarning
    ignore:.*Pydantic V1.*:DeprecationWarning
