# providers.yaml — Talky.ai Provider Configuration
# Latency-optimised for 500ms target on a dental receptionist workflow
# All changes from baseline are marked with # LATENCY FIX

providers:
  # ──────────────────────────────────────────────────────────────
  # STT — Deepgram Flux
  # ──────────────────────────────────────────────────────────────
  stt:
    active: "flux"

    flux:
      api_key: ${DEEPGRAM_API_KEY}
      model: "flux-general-en"
      encoding: "linear16"
      sample_rate: 16000

      # LATENCY FIX 1: eot_timeout_ms 5000 → 800
      # The original 5s timeout means Deepgram waits 5 seconds of silence
      # before firing EndOfTurn. Dental patients give short answers ("Yes",
      # "No", "Tuesday at 3"). 800ms catches natural speech pauses without
      # cutting off longer answers.
      eot_timeout_ms: 800

      # LATENCY FIX 2: eot_threshold tightened to 0.6
      # Was 0.7 — slightly relaxed threshold responds 40-80ms earlier
      # on short confident utterances like appointment confirmations.
      eot_threshold: 0.6

      # LATENCY FIX 3: eager_eot_threshold enabled at 0.45
      # Was disabled (null). This fires EagerEndOfTurn when Deepgram is
      # 45% confident the user has finished. The LLM starts processing
      # speculatively. If the user keeps talking, TurnResumed cancels it.
      # Net saving on confirmed turns: 150-250ms (LLM starts during
      # the final 200ms of silence detection).
      eager_eot_threshold: 0.45

  # ──────────────────────────────────────────────────────────────
  # TTS — Cartesia Sonic 3
  # ──────────────────────────────────────────────────────────────
  tts:
    # LATENCY FIX 4: active: "google" → "cartesia"
    # Cartesia Sonic 3 delivers 90ms TTFA vs Google Chirp3 ~300ms.
    # The providers.yaml already had Cartesia configured but was
    # overridden by voice_config.py defaulting to "google".
    # Setting active here makes the factory pick Cartesia.
    active: "cartesia"

    cartesia:
      api_key: ${CARTESIA_API_KEY}
      model_id: "sonic-3"
      # Professional female voice — warm but efficient, good for dental
      voice_id: "6ccbfb76-1fc6-48f7-b71d-91ac6298247b"
      sample_rate: 16000   # Telephony-optimised

      # LATENCY FIX 5: speaking_rate 1.0 → 1.1
      # Dental receptionist calls are transactional. Slightly faster speech
      # (10% increase) reduces call duration by ~8 seconds on a 3-turn call.
      # Still sounds natural — 1.15+ starts sounding rushed.
      speaking_rate: 1.1
      language: "en"

    google:
      voice_id: "en-US-Chirp3-HD-Leda"
      language_code: "en-US"
      sample_rate: 24000
      speaking_rate: 1.0

  # ──────────────────────────────────────────────────────────────
  # LLM — Groq
  # ──────────────────────────────────────────────────────────────
  llm:
    active: "groq"

    groq:
      api_key: ${GROQ_API_KEY}

      # LATENCY FIX 6: model llama-3.3-70b-versatile → llama-3.1-8b-instant
      # llama-3.1-8b-instant: 560 tokens/sec on Groq
      # llama-3.3-70b-versatile: ~280 tokens/sec
      # For a dental receptionist the 8b model is more than capable.
      # The system prompt constrains it tightly — intelligence gap is invisible.
      model: "llama-3.1-8b-instant"

      # LATENCY FIX 7: temperature 0.7 → 0.4
      # Lower temperature = faster token selection + more predictable dental
      # responses. No creative variation needed for "confirm/reschedule/cancel".
      temperature: 0.4

      # LATENCY FIX 8: max_tokens 150 → 60
      # Dental answers are short: "Your appointment is confirmed for Tuesday
      # at 2 PM. See you then!" = 15 tokens. 60 tokens is ample headroom.
      # Lower ceiling = Groq returns faster (less buffering before stream end).
      max_tokens: 60

  # ──────────────────────────────────────────────────────────────
  # Telephony
  # ──────────────────────────────────────────────────────────────
  telephony:
    active: "sip"
    sip:
      pbx_backend: "auto"
    vonage:
      api_key: ${VONAGE_API_KEY}
      api_secret: ${VONAGE_API_SECRET}
      application_id: ${VONAGE_APP_ID}
      private_key_path: "./config/private.key"
      answer_url: "${API_BASE_URL}/api/v1/vonage/answer"
      event_url: "${API_BASE_URL}/api/v1/vonage/event"

  storage:
    active: "postgres"
    postgres:
      database_url: ${DATABASE_URL}
      recordings_dir: ${RECORDINGS_STORAGE_DIR}

# ──────────────────────────────────────────────────────────────
# WebSocket configuration
# ──────────────────────────────────────────────────────────────
websocket:
  max_connections: 1000
  connection_timeout_seconds: 300
  heartbeat_interval_seconds: 30
  heartbeat_timeout_seconds: 5
  max_message_size_bytes: 65536

  # LATENCY FIX 9: audio_chunk_size_ms 80 (unchanged — already optimal)
  audio_chunk_size_ms: 80
  audio_buffer_size: 100
  transcript_buffer_size: 50
  enable_latency_tracking: true

  # Target thresholds updated to reflect 500ms goal
  latency_warning_threshold_ms: 500
  latency_error_threshold_ms: 700

  use_binary_audio: true
  use_json_audio: false
