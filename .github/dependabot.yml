# Dependabot — automated dependency update PRs.
#
# Strategy:
#   - Weekly cadence (Mondays) so PRs land at start of week, not Friday night.
#   - Grouped updates per ecosystem to avoid PR-storm.
#   - Production deps default to security-only on the backend; minor/patch
#     for frontend & infra. Major bumps are always opened individually so a
#     reviewer must approve.
#   - open-pull-requests-limit caps noise per ecosystem.
version: 2

updates:
  # ── Python backend ──────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ── Frontend (Next.js / Talk-Leee) ──────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/Talk-Leee"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Pin major framework bumps to manual review (next, react)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions (workflow files) ─────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"

  # ── Docker base images ──────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: "docker"
    directory: "/services/voice-gateway-cpp"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: "docker"
    directory: "/telephony/asterisk"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: "docker"
    directory: "/telephony/freeswitch"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: "docker"
    directory: "/telephony/opensips"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"

  - package-ecosystem: "docker"
    directory: "/telephony/rtpengine"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"
