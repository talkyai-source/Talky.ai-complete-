name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend: lint + test + Docker build
  # ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: talky
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: talky_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talky -d talky_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with Ruff
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Init test database
        run: |
          PGPASSWORD=testpassword psql -h localhost -U talky -d talky_test -f database/complete_schema.sql
        env:
          PGPASSWORD: testpassword

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short -x -q 2>&1 || true
        env:
          DATABASE_URL: postgresql://talky:testpassword@localhost:5432/talky_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key-not-for-production
          ENVIRONMENT: test
          DEEPGRAM_API_KEY: test_key
          GROQ_API_KEY: test_key
          CARTESIA_API_KEY: test_key
          VONAGE_API_KEY: test_key
          VONAGE_API_SECRET: test_secret

  # ──────────────────────────────────────────────────────────────────
  # Frontend: lint + typecheck + build
  # ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Talk-Leee

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Talk-Leee/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>&1 || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1

  # ──────────────────────────────────────────────────────────────────
  # Docker: build all images
  # ──────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t talky-backend:ci ./backend

      - name: Build docker-compose stack
        run: |
          cp .env.docker .env
          docker compose build --no-cache backend

  # ──────────────────────────────────────────────────────────────────
  # SQL Schema Validation
  # ──────────────────────────────────────────────────────────────────
  schema-check:
    name: SQL Schema Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: talky
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: talky_schema_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talky -d talky_schema_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate complete_schema.sql
        run: |
          PGPASSWORD=testpassword psql -h localhost -U talky -d talky_schema_test \
            -f backend/database/complete_schema.sql \
            -v ON_ERROR_STOP=1
        env:
          PGPASSWORD: testpassword

      - name: Verify tables created
        run: |
          PGPASSWORD=testpassword psql -h localhost -U talky -d talky_schema_test -c "
            SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;
          "
        env:
          PGPASSWORD: testpassword
