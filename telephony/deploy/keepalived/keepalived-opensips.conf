# keepalived configuration — OpenSIPS node (MASTER)
#
# This configuration floats a Virtual IP (VIP) between the OpenSIPS host
# (MASTER, priority 100) and the Kamailio host (BACKUP, priority 90).
#
# Callers always dial the VIP.  If OpenSIPS goes down, keepalived detects
# this via the health check script and moves the VIP to Kamailio within ~3 s.
# When OpenSIPS recovers, the VIP moves back automatically.
#
# Deployment steps on the OpenSIPS host:
#   1. Copy this file to /etc/keepalived/keepalived.conf
#   2. Copy scripts/check_sbc_health.sh to /etc/keepalived/
#   3. chmod +x /etc/keepalived/check_sbc_health.sh
#   4. Set SBC_TYPE=opensips in /etc/keepalived/check_sbc_health.sh
#   5. systemctl enable keepalived && systemctl start keepalived
#
# Replace the placeholders:
#   OPENSIPS_HOST_IP  — real IP of this host (e.g., 10.0.0.1)
#   KAMAILIO_HOST_IP  — real IP of the Kamailio host (e.g., 10.0.0.2)
#   SBC_VIP           — shared virtual IP callers will dial (e.g., 10.0.0.100)
#   eth0              — network interface to bind the VIP

global_defs {
    router_id OPENSIPS_SBC
    # Disable vrrp strict mode so we can use non-default VRID values
    vrrp_strict off
    # Script execution user
    script_user root
    enable_script_security
}

# Health check script: exits 0 if SBC is healthy, non-zero otherwise.
# keepalived runs this every 2 s; if it fails twice (4 s), this node is
# demoted and the VIP migrates to the BACKUP node.
vrrp_script chk_sbc {
    script "/etc/keepalived/check_sbc_health.sh"
    interval 2
    fall     2
    rise     3
    timeout  3
    weight   -30
}

vrrp_instance SBC_HA {
    state MASTER
    interface eth0                          # ← change to your interface name
    virtual_router_id 51                   # must match on both nodes
    priority 100                           # MASTER = highest priority
    advert_int 1                           # VRRP advertisement interval (s)
    nopreempt                              # optional: prevent VIP flapping after recovery

    authentication {
        auth_type PASS
        auth_pass talky_sbc_ha             # ← change to a strong shared secret
    }

    unicast_src_ip OPENSIPS_HOST_IP        # ← replace with actual host IP
    unicast_peer {
        KAMAILIO_HOST_IP                   # ← replace with Kamailio host IP
    }

    virtual_ipaddress {
        SBC_VIP/32                         # ← replace with VIP (e.g., 10.0.0.100)
    }

    track_script {
        chk_sbc
    }

    notify_master   "/etc/keepalived/notify.sh MASTER"
    notify_backup   "/etc/keepalived/notify.sh BACKUP"
    notify_fault    "/etc/keepalived/notify.sh FAULT"
}
