# keepalived configuration — Kamailio node (BACKUP)
#
# Mirror of keepalived-opensips.conf with BACKUP state and lower priority.
# The only differences from the MASTER config are:
#   state MASTER → BACKUP
#   priority 100 → 90
#   unicast_src_ip / unicast_peer swapped
#
# Deployment steps on the Kamailio host:
#   1. Copy this file to /etc/keepalived/keepalived.conf
#   2. Copy scripts/check_sbc_health.sh to /etc/keepalived/
#   3. chmod +x /etc/keepalived/check_sbc_health.sh
#   4. Set SBC_TYPE=kamailio in /etc/keepalived/check_sbc_health.sh
#   5. systemctl enable keepalived && systemctl start keepalived

global_defs {
    router_id KAMAILIO_SBC
    vrrp_strict off
    script_user root
    enable_script_security
}

vrrp_script chk_sbc {
    script "/etc/keepalived/check_sbc_health.sh"
    interval 2
    fall     2
    rise     3
    timeout  3
    weight   -30
}

vrrp_instance SBC_HA {
    state BACKUP                           # ← BACKUP on Kamailio node
    interface eth0                         # ← change to your interface name
    virtual_router_id 51                   # must match on both nodes
    priority 90                            # BACKUP = lower priority than MASTER
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass talky_sbc_ha             # ← must match MASTER config
    }

    unicast_src_ip KAMAILIO_HOST_IP        # ← replace with Kamailio host IP
    unicast_peer {
        OPENSIPS_HOST_IP                   # ← replace with OpenSIPS host IP
    }

    virtual_ipaddress {
        SBC_VIP/32                         # ← replace with same VIP as MASTER
    }

    track_script {
        chk_sbc
    }

    notify_master   "/etc/keepalived/notify.sh MASTER"
    notify_backup   "/etc/keepalived/notify.sh BACKUP"
    notify_fault    "/etc/keepalived/notify.sh FAULT"
}
