[server:default]
private_key = /etc/kamailio/certs/server.key
certificate = /etc/kamailio/certs/server.crt
# SECURITY HARDENING: Enable TLS certificate validation
# Prevents MITM attacks on backup SBC
method = TLSv1.2+
ca_list = /etc/ssl/certs/ca-certificates.crt
verify_certificate = yes
require_certificate = yes

[client:default]
# SECURITY: Validate certificates for outbound connections
ca_list = /etc/ssl/certs/ca-certificates.crt
verify_certificate = yes
require_certificate = yes
