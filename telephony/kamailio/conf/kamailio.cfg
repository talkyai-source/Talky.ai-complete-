#!KAMAILIO
#!trydefenv KAMAILIO_SIP_IP
#!trydefenv KAMAILIO_SIP_PORT
#!trydefenv KAMAILIO_TLS_PORT
#!trydefenv KAMAILIO_TLS_ONLY
#!trydefenv KAMAILIO_CANARY_ENABLED
#!trydefenv KAMAILIO_CANARY_PERCENT
#!trydefenv KAMAILIO_CANARY_FREEZE
#!ifndef KAMAILIO_SIP_IP
#!define KAMAILIO_SIP_IP 0.0.0.0
#!endif
#!ifndef KAMAILIO_SIP_PORT
#!define KAMAILIO_SIP_PORT 15060
#!endif
#!ifndef KAMAILIO_TLS_PORT
#!define KAMAILIO_TLS_PORT 15061
#!endif
#!ifndef KAMAILIO_TLS_ONLY
#!define KAMAILIO_TLS_ONLY 0
#!endif
#!ifndef KAMAILIO_CANARY_ENABLED
#!define KAMAILIO_CANARY_ENABLED 0
#!endif
#!ifndef KAMAILIO_CANARY_PERCENT
#!define KAMAILIO_CANARY_PERCENT 0
#!endif
#!ifndef KAMAILIO_CANARY_FREEZE
#!define KAMAILIO_CANARY_FREEZE 0
#!endif

####### Global Parameters #########
debug = 2
log_stderror = yes
fork = yes
children = 8

disable_tcp = no
auto_aliases = no
enable_tls = yes

listen = udp:KAMAILIO_SIP_IP:KAMAILIO_SIP_PORT
listen = tcp:KAMAILIO_SIP_IP:KAMAILIO_SIP_PORT
listen = tls:KAMAILIO_SIP_IP:KAMAILIO_TLS_PORT

####### Modules Section ########
loadmodule "tls.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "sanity.so"
loadmodule "cfgutils.so"
loadmodule "ctl.so"
loadmodule "permissions.so"
loadmodule "pike.so"
loadmodule "ratelimit.so"
loadmodule "textops.so"
loadmodule "xlog.so"
loadmodule "dispatcher.so"

####### Module Parameters ########
modparam("tls", "config", "/etc/kamailio/tls.cfg")
modparam("permissions", "address_file", "/etc/kamailio/address.list")
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 120)
modparam("ratelimit", "timer_interval", 5)
modparam("ratelimit", "queue", "1:INVITE")
modparam("ratelimit", "queue", "2:REGISTER")
modparam("ratelimit", "queue", "3:SUBSCRIBE")
modparam("ratelimit", "queue", "0:*")
modparam("ratelimit", "pipe", "1:TAILDROP:60")
modparam("ratelimit", "pipe", "2:TAILDROP:40")
modparam("ratelimit", "pipe", "3:TAILDROP:40")
modparam("ratelimit", "pipe", "0:TAILDROP:200")
modparam("cfgutils", "initial_probability", 0)
modparam("ctl", "binrpc", "unix:/var/run/kamailio/kamailio_ctl")
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "ds_ping_interval", 10)
modparam("dispatcher", "ds_probing_threshold", 2)
modparam("dispatcher", "ds_inactive_threshold", 1)
modparam("dispatcher", "ds_ping_reply_codes", "class=2;code=403;code=404;code=483")

####### Routing Logic ########
request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("1511", "7")) {
        sl_send_reply("400", "Bad Request");
        exit;
    }

    # WS-B baseline: allow only trusted source ranges from address.list group 1.
    if (!allow_source_address("1")) {
        xlog("L_WARN", "Blocked untrusted source\n");
        sl_send_reply("403", "Forbidden Source");
        exit;
    }

    # WS-B baseline: coarse flood control.
    if (!pike_check_req()) {
        xlog("L_WARN", "Blocked flood source\n");
        sl_send_reply("403", "Flood Detected");
        exit;
    }

    # WS-B baseline: method-level rate limiting.
    if (is_method("INVITE|REGISTER|SUBSCRIBE|MESSAGE|OPTIONS|REFER|UPDATE")) {
        if (!rl_check()) {
            append_to_reply("Retry-After: 5\r\n");
            sl_send_reply("503", "Rate Limited");
            exit;
        }
    }

    # WS-A baseline synthetic health probe endpoint.
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Registration is out of scope for WS-A bootstrap.
    if (is_method("REGISTER")) {
        sl_send_reply("403", "Registration Disabled");
        exit;
    }

    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    if (is_method("INVITE")
        && KAMAILIO_CANARY_ENABLED == 1
        && KAMAILIO_CANARY_FREEZE == 0) {
        rand_set_prob("KAMAILIO_CANARY_PERCENT");
        if (rand_event()) {
            if (!ds_select_dst("2", "4")) {
                xlog("L_WARN", "Canary destination unavailable; falling back to stable dispatcher set\n");
                if (!ds_select_dst("1", "4")) {
                    xlog("L_ERR", "No dispatcher destination available\n");
                    sl_send_reply("503", "No Upstream Gateway");
                    exit;
                }
            } else {
                xlog("L_INFO", "WS-E canary lane selected for INVITE\n");
            }
        } else {
            if (!ds_select_dst("1", "4")) {
                xlog("L_ERR", "No dispatcher destination available\n");
                sl_send_reply("503", "No Upstream Gateway");
                exit;
            }
        }
    } else {
        if (!ds_select_dst("1", "4")) {
            xlog("L_ERR", "No dispatcher destination available\n");
            sl_send_reply("503", "No Upstream Gateway");
            exit;
        }
    }

    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
