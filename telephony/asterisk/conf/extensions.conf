[general]
static=yes
writeprotect=yes

[from-opensips]
; Test extension – AI answers immediately
exten => 750,1,NoOp(AI test call to extension ${EXTEN})
 same => n,Answer()
 same => n,Stasis(talky_ai,inbound)
 same => n,Hangup()

; Route specific PBX extensions through AI pipeline, then to external PBX
exten => 1002,1,NoOp(AI call to external PBX extension ${EXTEN})
 same => n,Stasis(talky_ai,inbound)
 same => n,Hangup()

; Catch-all: any inbound INVITE via OpenSIPS enters AI Stasis
exten => _X.,1,NoOp(Inbound INVITE via OpenSIPS to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(talky_ai,inbound)
 same => n,Hangup()

; AI Outbound calling context
; Used by ARI originate when the adapter falls back to Local channels.
; Enters Stasis so the AI pipeline is properly attached.
[ai-outbound]
exten => _X.,1,NoOp(AI outbound call to ${EXTEN})
 same => n,Stasis(talky_ai,outbound)
 same => n,Hangup()

; WS-M synthetic scenarios for dialplan-level media and transfer validation.
; These contexts are used by verify_ws_m.sh via Local channels.
[wsm-synthetic]
exten => longcall,1,NoOp(WS-M synthetic long-call scenario)
 same => n,Answer()
 same => n,Set(WSM_DURATION=12)
 same => n,Set(WSM_RESULT=longcall:${WSM_DURATION})
 same => n,Set(DB(wsm/longcall_${UNIQUEID})=${WSM_RESULT})
 same => n,Wait(${WSM_DURATION})
 same => n,Hangup()

exten => blind,1,NoOp(WS-M synthetic blind transfer scenario)
 same => n,Answer()
 same => n,Set(WSM_RESULT=blind:pass)
 same => n,Set(DB(wsm/blind_pass_${UNIQUEID})=${WSM_RESULT})
 same => n,Goto(wsm-synthetic,blind_target,1)

exten => blind_target,1,NoOp(WS-M blind transfer target)
 same => n,Set(WSM_RESULT=blind_target:reached)
 same => n,Set(DB(wsm/blind_target_${UNIQUEID})=${WSM_RESULT})
 same => n,Hangup()

exten => attended,1,NoOp(WS-M synthetic attended transfer scenario)
 same => n,Answer()
 same => n,Set(WSM_RESULT=attended:pass)
 same => n,Set(DB(wsm/attended_pass_${UNIQUEID})=${WSM_RESULT})
 same => n,Goto(wsm-synthetic,attended_target,1)

exten => attended_consult,1,NoOp(WS-M attended consult leg)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Hangup()

exten => attended_target,1,NoOp(WS-M attended transfer target)
 same => n,Set(WSM_RESULT=attended_target:reached)
 same => n,Set(DB(wsm/attended_target_${UNIQUEID})=${WSM_RESULT})
 same => n,Hangup()

[default]
exten => _X.,1,NoOp(Unexpected call in default context to ${EXTEN})
 same => n,Playback(invalid)
 same => n,Hangup()
