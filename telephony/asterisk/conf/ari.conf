[general]
enabled = yes
pretty = no
allowed_origins = *

; Primary ARI user for the TelephonyBridge / AsteriskAdapter.
; The adapter defaults to ASTERISK_ARI_USER="talky" and
; ASTERISK_ARI_PASSWORD="talky_local_only_change_me".
[talky]
type = user
read_only = no
password = talky_local_only_change_me

; Legacy user for Day 5 ARI tests (backward compatibility).
[day5]
type = user
read_only = no
password = day5_local_only_change_me
