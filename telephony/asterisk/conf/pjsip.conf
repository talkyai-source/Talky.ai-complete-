[global]
type=global
user_agent=Talky-Asterisk
timers=yes
timers_min_se=90

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5070

[talky-opensips]
type=endpoint
transport=transport-udp
context=from-opensips
disallow=all
; Frozen plan baseline codec: PCMU only for sprint execution.
allow=ulaw
aors=talky-opensips

; Keep proxy in route-set using loose routing (RFC3261 lr parameter).
outbound_proxy=sip:127.0.0.1:15060\;lr

; Keep media anchored in B2BUA unless direct-media topology is explicitly validated.
direct_media=no
timers=yes
timers_min_se=90
timers_sess_expires=1800

[talky-opensips]
type=aor
contact=sip:127.0.0.1:15060
qualify_frequency=30

[talky-opensips]
type=identify
endpoint=talky-opensips
match=127.0.0.1

; ---------------------------------------------------------------------------
; Optional LAN PBX outbound profile (manual live-call validation).
; This does not affect the frozen OpenSIPS -> Asterisk primary ingress path.
; ---------------------------------------------------------------------------
[lan-pbx-auth]
type=auth
auth_type=userpass
username=1002
password=1002

[lan-pbx-aor]
type=aor
contact=sip:192.168.1.6:5060
qualify_frequency=30

[lan-pbx]
type=endpoint
transport=transport-udp
context=from-opensips
disallow=all
allow=ulaw
aors=lan-pbx-aor
outbound_auth=lan-pbx-auth
from_user=1002
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[lan-pbx-identify]
type=identify
endpoint=lan-pbx
match=192.168.1.6

[lan-pbx-registration]
type=registration
transport=transport-udp
outbound_auth=lan-pbx-auth
server_uri=sip:192.168.1.6:5060
client_uri=sip:1002@192.168.1.6
contact_user=1002
retry_interval=60
forbidden_retry_interval=300
expiration=300
