[global]
type=global
user_agent=Talky-Asterisk
timers=yes
timers_min_se=90

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5070

[talky-opensips]
type=endpoint
transport=transport-udp
context=from-opensips
disallow=all
; Frozen plan baseline codec: PCMU only for sprint execution.
allow=ulaw
aors=talky-opensips

; Keep proxy in route-set using loose routing (RFC3261 lr parameter).
outbound_proxy=sip:127.0.0.1:15060\;lr

; Keep media anchored in B2BUA unless direct-media topology is explicitly validated.
direct_media=no
timers=yes
timers_min_se=90
timers_sess_expires=1800

[talky-opensips]
type=aor
contact=sip:127.0.0.1:15060
qualify_frequency=30

[talky-opensips]
type=identify
endpoint=talky-opensips
match=127.0.0.1

; ---------------------------------------------------------------------------
; LAN PBX outbound trunk — used by ARI originate to ring softphones registered
; at the local PBX (192.168.1.6).
;
; Design notes:
;   • Asterisk does NOT register at 192.168.1.6.  Registration would claim
;     extension 1002 at the PBX, causing every outbound INVITE for 1002 to
;     loop back to Asterisk instead of ringing the softphone.
;   • outbound_auth handles the 401 challenge the PBX issues on each INVITE.
;   • from_user=talky-ai gives Asterisk a distinct identity so the PBX never
;     sees a self-call (From==To), which some PBXes reject with 482 Loop.
;   • The primary ingress path (OpenSIPS → Asterisk) is unaffected.
; ---------------------------------------------------------------------------
[lan-pbx-auth]
type=auth
auth_type=userpass
username=1002
password=1002

[lan-pbx-aor]
type=aor
contact=sip:192.168.1.6:5060
qualify_frequency=30

[lan-pbx]
type=endpoint
transport=transport-udp
context=from-opensips
disallow=all
allow=ulaw
aors=lan-pbx-aor
outbound_auth=lan-pbx-auth
from_user=talky-ai
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[lan-pbx-identify]
type=identify
endpoint=lan-pbx
match=192.168.1.6

; NOTE: [lan-pbx-registration] is intentionally absent.
; Registering Asterisk as extension 1002 at the PBX causes outbound calls
; to 1002 to loop: PBX routes the INVITE back to Asterisk (since it is the
; registered owner of 1002) instead of forwarding to the softphone.
; The softphone must be the sole registrant of extension 1002 at 192.168.1.6.
