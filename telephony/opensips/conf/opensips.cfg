#!trydefenv OPENSIPS_SIP_IP
#!trydefenv OPENSIPS_SIP_PORT
#!trydefenv OPENSIPS_TLS_PORT
#!trydefenv OPENSIPS_UDP_WORKERS
#!trydefenv OPENSIPS_TLS_DH_PARAMS
#!trydefenv OPENSIPS_CANARY_ENABLED
#!trydefenv OPENSIPS_CANARY_PERCENT
#!trydefenv OPENSIPS_CANARY_FREEZE

#!ifndef OPENSIPS_SIP_IP
#!define OPENSIPS_SIP_IP 0.0.0.0
#!endif
#!ifndef OPENSIPS_SIP_PORT
#!define OPENSIPS_SIP_PORT 15060
#!endif
#!ifndef OPENSIPS_TLS_PORT
#!define OPENSIPS_TLS_PORT 15061
#!endif
#!ifndef OPENSIPS_UDP_WORKERS
#!define OPENSIPS_UDP_WORKERS 8
#!endif
#!ifndef OPENSIPS_CANARY_ENABLED
#!define OPENSIPS_CANARY_ENABLED 0
#!endif
#!ifndef OPENSIPS_CANARY_PERCENT
#!define OPENSIPS_CANARY_PERCENT 0
#!endif
#!ifndef OPENSIPS_CANARY_FREEZE
#!define OPENSIPS_CANARY_FREEZE 0
#!endif

####### Global Parameters #########
log_level = 3
stderror_enabled = yes
udp_workers = $def(OPENSIPS_UDP_WORKERS)
auto_aliases = no
mpath = "/usr/lib/x86_64-linux-gnu/opensips/modules/"

socket = udp:0.0.0.0:15060
socket = tcp:0.0.0.0:15060
socket = tls:0.0.0.0:15061

####### Modules Section ########
loadmodule "proto_tls.so"
loadmodule "proto_udp.so"
loadmodule "proto_tcp.so"
loadmodule "tls_mgm.so"
loadmodule "tls_openssl.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "cfgutils.so"
loadmodule "mi_fifo.so"
loadmodule "pike.so"
loadmodule "ratelimit.so"
loadmodule "sipmsgops.so"
loadmodule "textops.so"
loadmodule "rtpengine.so"
# Dispatcher: file-backed, no DB required.
# Provides health-probed automatic failover between Asterisk (primary)
# and FreeSWITCH (backup) via SIP OPTIONS pings.
loadmodule "dispatcher.so"

####### Module Parameters ########
modparam("tls_mgm", "server_domain", "default")
modparam("tls_mgm", "match_ip_address", "[default]*")
modparam("tls_mgm", "tls_method", "[default]TLSv1_2-TLSv1_3")
modparam("tls_mgm", "certificate", "[default]/etc/opensips/certs/server.crt")
modparam("tls_mgm", "private_key", "[default]/etc/opensips/certs/server.key")
modparam("tls_mgm", "ca_list", "[default]/etc/ssl/certs/ca-certificates.crt")
modparam("tls_mgm", "ciphers_list", "[default]ECDHE+AESGCM:!aNULL:!eNULL:!EXPORT:!3DES:!RC4:!MD5")
#!ifdef OPENSIPS_TLS_DH_PARAMS
modparam("tls_mgm", "dh_params", "[default]OPENSIPS_TLS_DH_PARAMS")
#!endif
# SECURITY HARDENING: Enable TLS certificate validation
# Prevents man-in-the-middle attacks and credential theft
# Production requirement: All TLS connections must validate certificates
modparam("tls_mgm", "verify_cert", "[default]1")
modparam("tls_mgm", "require_cert", "[default]1")

modparam("mi_fifo", "fifo_name", "/tmp/opensips_fifo")
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 120)
modparam("ratelimit", "timer_interval", 5)
modparam("cfgutils", "initial_probability", 0)
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# Dispatcher: file-backed destination list.
# ds_probing_mode=1 → probe ALL destinations (active and inactive).
# If Asterisk (priority 0) misses 3 consecutive OPTIONS pings (~15s) it is
# marked inactive and all new calls are routed to FreeSWITCH (priority 1).
# When Asterisk recovers it re-enters the pool automatically.
modparam("dispatcher", "list_file", "/etc/opensips/dispatcher.list")
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_interval", 5)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "options_reply_codes", "200")

####### Routing Logic ########
route {
    if (!mf_process_maxfwd_header(70)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    # WS-B baseline: allow trusted private/LAN source ranges only.
    if (
        $si != "127.0.0.1" &&
        $si != "::1" &&
        !($si =~ "^10\\.") &&
        !($si =~ "^192\\.168\\.") &&
        !($si =~ "^172\\.(1[6-9]|2[0-9]|3[0-1])\\.") &&
        !($si =~ "^100\\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\\.")
    ) {
        sl_send_reply(403, "Forbidden Source");
        exit;
    }

    # WS-B baseline: coarse flood control.
    if (!pike_check_req()) {
        sl_send_reply(403, "Flood Detected");
        exit;
    }

    # WS-B baseline: method-level rate limiting.
    if (is_method("INVITE") && !rl_check("invite", 60, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }
    if (is_method("REGISTER") && !rl_check("register", 40, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }
    if (is_method("SUBSCRIBE") && !rl_check("subscribe", 40, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }
    if (is_method("MESSAGE|OPTIONS|REFER|UPDATE") && !rl_check("generic", 200, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }

    # WS-A baseline synthetic health probe endpoint.
    if (is_method("OPTIONS")) {
        sl_send_reply(200, "OK");
        exit;
    }

    # Registration is out of scope for bootstrap.
    if (is_method("REGISTER")) {
        sl_send_reply(403, "Registration Disabled");
        exit;
    }

    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    if (is_method("INVITE")) {
        t_on_reply("WS_M_RTP_REPLY");
    }

    route(WS_M_MANAGE_RTP);

    # B2BUA routing via dispatcher with automatic health-probed failover.
    # Set 1 contains Asterisk (priority 0, primary) and FreeSWITCH (priority 1, backup).
    # Algorithm 4 = round-robin with failover (skips inactive destinations).
    # Canary routing: if enabled, split traffic between set 1 (stable) and set 2 (canary).
    if (is_method("INVITE")
        && $def(OPENSIPS_CANARY_ENABLED) == 1
        && $def(OPENSIPS_CANARY_FREEZE) == 0) {
        rand_set_prob("$def(OPENSIPS_CANARY_PERCENT)");
        if (rand_event()) {
            if (!ds_select_dst(2, 4)) {
                xlog("L_WARN", "Canary set 2 unavailable, falling back to set 1\n");
                if (!ds_select_dst(1, 4)) {
                    sl_send_reply(502, "No Available B2BUA");
                    exit;
                }
            }
        } else {
            if (!ds_select_dst(1, 4)) {
                sl_send_reply(502, "No Available B2BUA");
                exit;
            }
        }
    } else {
        if (!ds_select_dst(1, 4)) {
            sl_send_reply(502, "No Available B2BUA");
            exit;
        }
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

route[WS_M_MANAGE_RTP] {
    if (is_method("INVITE") && has_body("application/sdp")) {
        # SECURITY HARDENING: Force SRTP encryption for all media
        # DTLS=passive: Use DTLS-SRTP for WebRTC compatibility
        # SDES-off: Disable less secure SDES key exchange
        # Protects against media eavesdropping and interception
        if (!rtpengine_offer("replace-origin replace-session-connection ICE=remove DTLS=passive")) {
            sl_send_reply(500, "Media Relay Offer Failed");
            exit;
        }
        return;
    }

    if (is_method("BYE|CANCEL")) {
        if (!rtpengine_delete()) {
            xlog("L_WARN", "WS-M: rtpengine_delete failed for $rm $ci\n");
        }
        return;
    }
}

onreply_route[WS_M_RTP_REPLY] {
    if (!t_check_status("18[0-9]|2[0-9][0-9]")) {
        return;
    }
    if (!has_body("application/sdp")) {
        return;
    }
    # SECURITY: Apply same SRTP enforcement to answer
    if (!rtpengine_answer("replace-origin replace-session-connection ICE=remove DTLS=passive")) {
        xlog("L_ERR", "WS-M: rtpengine_answer failed for $rs $rr $ci\n");
    }
}
