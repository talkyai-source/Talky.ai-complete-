#!trydefenv OPENSIPS_SIP_IP
#!trydefenv OPENSIPS_SIP_PORT
#!trydefenv OPENSIPS_TLS_PORT
#!trydefenv OPENSIPS_CANARY_ENABLED
#!trydefenv OPENSIPS_CANARY_PERCENT
#!trydefenv OPENSIPS_CANARY_FREEZE
#!trydefenv DB_URL

#!ifndef OPENSIPS_SIP_IP
#!define OPENSIPS_SIP_IP 0.0.0.0
#!endif
#!ifndef OPENSIPS_SIP_PORT
#!define OPENSIPS_SIP_PORT 15060
#!endif
#!ifndef OPENSIPS_TLS_PORT
#!define OPENSIPS_TLS_PORT 15061
#!endif
#!ifndef OPENSIPS_CANARY_ENABLED
#!define OPENSIPS_CANARY_ENABLED 0
#!endif
#!ifndef OPENSIPS_CANARY_PERCENT
#!define OPENSIPS_CANARY_PERCENT 0
#!endif
#!ifndef OPENSIPS_CANARY_FREEZE
#!define OPENSIPS_CANARY_FREEZE 0
#!endif
#!ifndef DB_URL
#!define DB_URL mysql://opensips:opensipsrw@localhost/opensips
#!endif

####### Global Parameters #########
log_level = 3
stderror_enabled = yes
udp_workers = 8
auto_aliases = no
mpath = "/usr/lib/x86_64-linux-gnu/opensips/modules/"

socket = udp:0.0.0.0:15060
socket = tcp:0.0.0.0:15060
socket = tls:0.0.0.0:15061

####### Modules Section ########
loadmodule "proto_tls.so"
loadmodule "proto_udp.so"
loadmodule "proto_tcp.so"
loadmodule "tls_mgm.so"
loadmodule "tls_openssl.so"
loadmodule "signaling.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "cfgutils.so"
loadmodule "mi_fifo.so"
loadmodule "pike.so"
loadmodule "ratelimit.so"
loadmodule "sipmsgops.so"
loadmodule "textops.so"
loadmodule "rtpengine.so"
loadmodule "dispatcher.so"

# SECURITY: SIP Digest Authentication Modules
loadmodule "db_mysql.so"
loadmodule "auth.so"
loadmodule "auth_db.so"

####### Module Parameters ########

# TLS Configuration
modparam("tls_mgm", "server_domain", "default")
modparam("tls_mgm", "match_ip_address", "[default]*")
modparam("tls_mgm", "tls_method", "[default]TLSv1_2-TLSv1_3")
modparam("tls_mgm", "certificate", "[default]/etc/opensips/certs/server.crt")
modparam("tls_mgm", "private_key", "[default]/etc/opensips/certs/server.key")
modparam("tls_mgm", "ca_list", "[default]/etc/ssl/certs/ca-certificates.crt")
modparam("tls_mgm", "verify_cert", "[default]1")
modparam("tls_mgm", "require_cert", "[default]1")

# Core Modules
modparam("mi_fifo", "fifo_name", "/tmp/opensips_fifo")
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 120)
modparam("ratelimit", "timer_interval", 5)
modparam("cfgutils", "initial_probability", 0)
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# Dispatcher Configuration
modparam("dispatcher", "list_file", "/etc/opensips/dispatcher.list")
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_interval", 5)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "options_reply_codes", "200,501,403,404,483")

# SECURITY: Authentication Module Configuration (RFC 8760 Support)
# Nonce expires after 30 seconds to prevent replay attacks
modparam("auth", "nonce_expire", 30)
# Secret for nonce generation (32 characters)
# IMPORTANT: Change this in production and keep it secret
modparam("auth", "secret", "change_this_to_random_32chars!")
# Disable nonce reuse check if using load balancer
# modparam("auth", "disable_nonce_check", 0)

# SECURITY: Database Authentication Configuration
modparam("auth_db", "db_url", "$def(DB_URL)")
# Use pre-calculated HA1 hashes (more secure than plaintext)
modparam("auth_db", "calculate_ha1", 0)
# Use domain in authentication (multi-tenant support)
modparam("auth_db", "use_domain", 1)
# Load additional credentials (email, rpid)
modparam("auth_db", "load_credentials", "email_address;rpid")
# Database column names (default values, can be customized)
modparam("auth_db", "user_column", "username")
modparam("auth_db", "domain_column", "domain")
modparam("auth_db", "password_column", "ha1")
modparam("auth_db", "hash_column_sha256", "ha1_sha256")
modparam("auth_db", "hash_column_sha512t256", "ha1_sha512t256")

####### Routing Logic ########
route {
    # Max-Forwards check
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    # SECURITY: Source IP filtering (private networks only)
    if (
        $si != "127.0.0.1" &&
        $si != "::1" &&
        !($si =~ "^10\\.") &&
        !($si =~ "^192\\.168\\.") &&
        !($si =~ "^172\\.(1[6-9]|2[0-9]|3[0-1])\\.") &&
        !($si =~ "^100\\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\\.")
    ) {
        sl_send_reply(403, "Forbidden Source");
        exit;
    }

    # SECURITY: Flood control
    if (!pike_check_req()) {
        xlog("L_WARN", "SECURITY: Flood detected from $si\n");
        sl_send_reply(403, "Flood Detected");
        exit;
    }

    # SECURITY: Method-level rate limiting
    if (is_method("INVITE") && !rl_check("invite", 60, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }
    if (is_method("REGISTER") && !rl_check("register", 40, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }
    if (is_method("SUBSCRIBE") && !rl_check("subscribe", 40, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }
    if (is_method("MESSAGE|OPTIONS|REFER|UPDATE") && !rl_check("generic", 200, "TAILDROP")) {
        append_to_reply("Retry-After: 5\r\n");
        sl_send_reply(503, "Rate Limited");
        exit;
    }

    # Health probe endpoint (no authentication required)
    if (is_method("OPTIONS") && uri==myself) {
        sl_send_reply(200, "OK");
        exit;
    }

    # SECURITY: SIP Digest Authentication for INVITE
    # Prevents toll fraud and unauthorized call origination
    if (is_method("INVITE")) {
        route(AUTH);
    }

    # Record-Route for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # RTP management
    if (is_method("INVITE")) {
        t_on_reply("WS_M_RTP_REPLY");
    }

    route(WS_M_MANAGE_RTP);

    # B2BUA routing via dispatcher
    if (is_method("INVITE")
        && $def(OPENSIPS_CANARY_ENABLED) == 1
        && $def(OPENSIPS_CANARY_FREEZE) == 0) {
        rand_set_prob("$def(OPENSIPS_CANARY_PERCENT)");
        if (rand_event()) {
            if (!ds_select_dst(2, 4)) {
                xlog("L_WARN", "Canary set 2 unavailable, falling back to set 1\n");
                if (!ds_select_dst(1, 4)) {
                    sl_send_reply(502, "No Available B2BUA");
                    exit;
                }
            }
        } else {
            if (!ds_select_dst(1, 4)) {
                sl_send_reply(502, "No Available B2BUA");
                exit;
            }
        }
    } else {
        if (!ds_select_dst(1, 4)) {
            sl_send_reply(502, "No Available B2BUA");
            exit;
        }
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# SECURITY: Authentication Route
# Implements SIP Digest Authentication with RFC 8760 support
route[AUTH] {
    # Check if request is already authorized
    if (has_credentials("Proxy-Authorization")) {
        # Verify credentials against database
        # Use empty realm "" to auto-generate from From domain
        # Supports MD5, SHA-256, SHA-512-256 algorithms
        if (!proxy_authorize("", "subscriber")) {
            # Authentication failed
            $var(auth_code) = $retcode;
            
            if ($var(auth_code) == -1) {
                xlog("L_WARN", "AUTH: Invalid user $au from $si\n");
            } else if ($var(auth_code) == -2) {
                xlog("L_WARN", "AUTH: Invalid password for $au from $si\n");
            } else if ($var(auth_code) == -3) {
                xlog("L_INFO", "AUTH: Stale nonce for $au from $si\n");
            } else if ($var(auth_code) == -4) {
                xlog("L_WARN", "AUTH: No credentials found from $si\n");
            } else {
                xlog("L_ERR", "AUTH: Generic error for $au from $si\n");
            }
            
            # Challenge with multiple algorithms (RFC 8760)
            # Offer SHA-512-256 and SHA-256 (stronger), fallback to MD5
            proxy_challenge("", "auth", "SHA-512-256,SHA-256,MD5");
            exit;
        }
        
        # Authentication successful
        xlog("L_INFO", "AUTH: User $au authenticated from $si\n");
        
        # Remove credentials from forwarded message (security best practice)
        consume_credentials();
        
        # Optional: Load additional user attributes
        # $avp(email_address) and $avp(rpid) are now available
        
        return;
    } else {
        # No credentials provided, challenge the user
        xlog("L_INFO", "AUTH: Challenging user from $si\n");
        
        # Challenge with multiple algorithms (RFC 8760)
        # Client will choose strongest algorithm it supports
        proxy_challenge("", "auth", "SHA-512-256,SHA-256,MD5");
        exit;
    }
}

# RTP Management Route
route[WS_M_MANAGE_RTP] {
    if (is_method("INVITE") && has_body("application/sdp")) {
        # SECURITY: Force SRTP encryption for all media
        # DTLS=passive: Use DTLS-SRTP for WebRTC compatibility
        if (!rtpengine_offer("replace-origin replace-session-connection ICE=remove DTLS=passive")) {
            sl_send_reply(500, "Media Relay Offer Failed");
            exit;
        }
        return;
    }

    if (is_method("BYE|CANCEL")) {
        if (!rtpengine_delete()) {
            xlog("L_WARN", "WS-M: rtpengine_delete failed for $rm $ci\n");
        }
        return;
    }
}

# RTP Reply Route
onreply_route[WS_M_RTP_REPLY] {
    if (!t_check_status("18[0-9]|2[0-9][0-9]")) {
        return;
    }
    if (!has_body("application/sdp")) {
        return;
    }
    # SECURITY: Apply same SRTP enforcement to answer
    if (!rtpengine_answer("replace-origin replace-session-connection ICE=remove DTLS=passive")) {
        xlog("L_ERR", "WS-M: rtpengine_answer failed for $rs $rr $ci\n");
    }
}
