[rtpengine]
table = 0
interface = lo
listen-ng = 0.0.0.0:2223
port-min = 30000
port-max = 34999
log-level = 6

# SECURITY HARDENING - CVE-2025-53399 Mitigation
# Requires RTPEngine version >= mr13.4.1.1
strict-source = yes
# Reject RTP packets from sources that don't match the negotiated endpoint
# Prevents RTP injection and media bleed attacks

# SRTP Enforcement
# Force SRTP encryption for all media streams
# Protects against eavesdropping and plaintext media interception
dtls-passive = yes
